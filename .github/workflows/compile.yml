name: Compile Typst

# 触发条件：当推送到 main 分支、发起 PR，或手动触发时执行
on:
  push:
    branches: [ "main" ]
    paths:
      -"**.typ"
  workflow_dispatch: 

# 并发控制：如果前一个还没跑完又推了新的，就取消前一个
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 获取你的仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 安装 Typst 环境
      - name: Setup Typst
        uses: typst-community/setup-typst@v3

      # 3. 编译 Typst 文件
      - name: Compile document
        run: typst compile --font-path ./fonts main.typ output.pdf

      # 4. 上传编译好的 PDF 作为产物 (Artifact)
      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: project-pdf
          path: output.pdf
